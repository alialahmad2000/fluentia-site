            "@type": "Answer",

        {
          "@type": "Question",
          "name": "متى تبدأ الدورات؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "نعتمد الأشهر الميلادية — الكورسات تبدأ مع بداية كل شهر. ومع ذلك، تستطيع الانضمام في أي وقت والمدرب يعوّضك عن الحصص السابقة."
          }
        },
        {
          "@type": "Question",
          "name": "هل أستطيع التسجيل في دورة IELTS مباشرة؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "دورة IELTS مصممة لمن لديه أساس متين في اللغة الإنجليزية. إذا كان مستواك مبتدئاً، ننصحك بالبدء بمسار التأسيس أو التطوير أولاً، ثم الانتقال إلى IELTS بجاهزية كاملة."
          }
        },
        {
          "@type": "Question",
          "name": "كم عدد الطلاب في الكلاس الواحد؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "حد أقصى 7 طلاب في كل مجموعة، على عكس المعاهد الأخرى التي قد تضم 20 أو 30 طالباً."
          }
        },
        {
          "@type": "Question",
          "name": "جربت دورات سابقة ولم أستفد — كيف تختلف أكاديمية طلاقة؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ندرس كل طالب بشكل فردي، نفهم شخصيته، ونضعه في المجموعة المناسبة لمستواه. المدرب يتابعك يومياً، والمحتوى مصمم بعناية علمية."
          }
        },
        {
          "@type": "Question",
          "name": "هل يمكنني تغيير الباقة؟",
          "acceptedAnswer": {
            "@type": "Answer",

        },

          "@type": "Question",
          "name": "هل جميع المدربين سعوديون؟",

            "@type": "Answer",
